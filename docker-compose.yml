version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jeet
      POSTGRES_PASSWORD: jeet
      POSTGRES_DB: jeet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://jeet:jeet@postgres:5432/jeet
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super-secret
      ML_SERVICE_URL: http://ml-service:8000
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - ml-service

  ml-service:
    build: ./ml-service
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      - ./database/sample-papers:/app/sample-papers:ro

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
